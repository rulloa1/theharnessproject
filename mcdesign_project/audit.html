<!DOCTYPE html>
<html>

<head>
    <title>Image Audit</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            background: #111;
            color: #fff;
        }

        .group {
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
        }

        img {
            max-width: 200px;
            display: block;
            margin-bottom: 5px;
            border-radius: 4px;
        }

        p {
            font-size: 12px;
            margin: 0;
            word-break: break-all;
            width: 200px;
        }
    </style>
</head>

<body>
    <script>
        const images = [
            "projects/1500x1000 (1).webp",
            "projects/1500x1000 (2).webp",
            "projects/1500x1000.webp",
            "projects/pool-design-1.webp",
            "projects/pool-design-11.webp",
            "projects/pool-design-12.webp",
            "projects/pool-design-2 (2).webp",
            "projects/pool-design-2.webp",
            "projects/pool-design-3.webp",
            "projects/pool-design-cover.webp",
            "projects/syracuse-10.webpsyracuse-10.webp",
            "projects/syracuse-24.webp",
            "projects/syracuse-4.webp",
            "projects/syracuse-45.webp",
            "projects/syracuse-46.webp",
            "projects/syracuse-8.webp",
            "projects/syracuse-9.webp",
            "projects/syracuse-cover.webp",
            "projects/ultra lux pool.jpg",
            "projects/unnamed (1).jpg",
            "projects/unnamed (10).jpg",
            "projects/unnamed (11).jpg",
            "projects/unnamed (12).jpg",
            "projects/unnamed (14).jpg",
            "projects/unnamed (16).jpg",
            "projects/unnamed (17).jpg",
            "projects/unnamed (18).jpg",
            "projects/unnamed (19).jpg",
            "projects/unnamed (2).jpg",
            "projects/unnamed (20).jpg",
            "projects/unnamed (22).jpg",
            "projects/unnamed (23).jpg",
            "projects/unnamed (24).jpg",
            "projects/unnamed (25).jpg",
            "projects/unnamed (26).jpg",
            "projects/unnamed (3).jpg",
            "projects/unnamed (4).jpg",
            "projects/unnamed (5).jpg",
            "projects/unnamed (6).jpg",
            "projects/unnamed (7).jpg",
            "projects/unnamed (8).jpg",
            "projects/unnamed (9).jpg",
            "projects/unnamed.jpg"
        ];
        images.forEach(src => {
            const div = document.createElement('div');
            div.className = 'group';
            div.innerHTML = `<img src="${src}"><p>${src}</p>`;
            document.body.appendChild(div);
        });
    </script>
</body>

</html>
